name: spras
channels:
  - conda-forge
dependencies:
  - adjusttext=1.3.0
  - bioconda::snakemake-minimal=9.19.0
  # Conda refers to pypi/docker as docker-py.
  - docker-py=7.1.0
  - matplotlib=3.10.9
  - networkx=3.6.1
  - pandas=3.0.2
  - pydantic=2.13.3
  - numpy=2.4.4
  - requests=2.33.1
  - scikit-learn=1.8.0
  - seaborn=0.13.2
  - spython=0.3.14

  # conda-specific for dsub
  - python-dateutil=2.9.0
  - pytz=2026.1
  - pyyaml=6.0.3
  - tenacity=9.1.4
  - tabulate=0.10.0

  # toolchain deps
  - pip=26.0.1
  # This should be the same as requires-python minus the >=.
  - python=3.13

  # development dependencies
  - pre-commit=4.6.0
  - pytest=9.0.3
  - pytest-split=0.11.0
  - sphinx=9.1.0
  - sphinx-rtd-theme=3.1.0

  - pip:
      - dsub==0.5.2
